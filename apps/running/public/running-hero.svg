<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="ランニング仲間をみつけよう" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f9f3"/>
      <stop offset="1" stop-color="#dcefe2"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe6c9"/>
      <stop offset="1" stop-color="#a7dbb4"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fc593"/>
      <stop offset="1" stop-color="#5fb277"/>
    </linearGradient>
    <linearGradient id="hill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f8a4d"/>
      <stop offset="1" stop-color="#1b6e3b"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="600" fill="url(#sky)"/>

  <!-- morning sun -->
  <circle cx="1290" cy="150" r="92" fill="#ffffff" opacity="0.85"/>
  <circle cx="1290" cy="150" r="92" fill="none" stroke="#1b6e3b" stroke-width="3" opacity="0.35"/>

  <!-- distant trees (line art) -->
  <g fill="none" stroke="#1b6e3b" stroke-width="3" opacity="0.28" stroke-linecap="round">
    <path d="M180 300 v-46 M180 254 l-22 22 M180 270 l22 22 M180 286 l-18 18"/>
    <path d="M250 308 v-40 M250 268 l-18 18 M250 282 l18 18"/>
    <path d="M1430 312 v-50 M1430 262 l-24 24 M1430 280 l24 24 M1430 296 l-18 18"/>
  </g>

  <!-- rolling hills -->
  <path d="M0 360 Q400 300 800 348 T1600 332 V600 H0 Z" fill="url(#hill1)"/>
  <path d="M0 430 Q500 360 1000 414 T1600 404 V600 H0 Z" fill="url(#hill2)"/>
  <path d="M0 520 Q420 470 900 506 T1600 492 V600 H0 Z" fill="url(#hill3)"/>

  <!-- winding running path -->
  <path d="M-40 600 C 280 470 520 540 760 470 C 1000 400 1180 470 1660 360"
        fill="none" stroke="#ffffff" stroke-width="46" stroke-linecap="round" opacity="0.92"/>
  <path d="M-40 600 C 280 470 520 540 760 470 C 1000 400 1180 470 1660 360"
        fill="none" stroke="#1b6e3b" stroke-width="46" stroke-linecap="round" opacity="0.10"/>
  <path d="M-40 600 C 280 470 520 540 760 470 C 1000 400 1180 470 1660 360"
        fill="none" stroke="#1b6e3b" stroke-width="3" stroke-dasharray="2 30" stroke-linecap="round" opacity="0.45"/>

  <!-- runner (echoes the logo mark), green line-art -->
  <g fill="#1b6e3b" transform="translate(560,150) scale(11)">
    <circle cx="13.5" cy="3.5" r="2"/>
    <path d="M9.89 19.38l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
  </g>

  <!-- motion lines behind the runner -->
  <g stroke="#1b6e3b" stroke-width="6" stroke-linecap="round" opacity="0.5">
    <path d="M470 300 h70"/>
    <path d="M440 340 h110"/>
    <path d="M480 380 h60"/>
  </g>
</svg>
