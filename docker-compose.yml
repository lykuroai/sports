# 自前サーバ / EC2 / 開発機 共通。統合サイト（web）+ 管理(admin) + Caddy リバースプロキシ。
# 統合サイト化により account/facility/golf/outdoor/running は web へ集約・撤去済み。
# 公開は spotomo.lykuro.ai（web）と admin-spotomo.lykuro.ai（admin）の2本のみ（単一オリジン）。
# 使い方:
#   cp .env.production.example .env.production   # シークレット等を設定
#   docker compose up -d --build
#
# DNS: 各サブドメインを当サーバ（本番）/ 127.0.0.1（開発機の /etc/hosts）へ向ける。
# TLS: Caddy が docker/certs のワイルドカード実証明書（*.lykuro.ai）で配信。
# Supabase は別途（ホスティング or セルフホスト）。

# クライアント/サーバ共通の公開値。
#   * build.args  … NEXT_PUBLIC_* をクライアントバンドルへ焼き込み（要 --build）
#   * environment … サーバ側の実行時値（env_file の値を上書きし齟齬を防ぐ）
# 統合サイト化（単一サイト）。NEXT_PUBLIC_* は Next が **ビルド時にバンドルへ焼き込む**ため、
# ここ（build.args）に正しい値を置くことが必須（.env.production の runtime 値は焼き込み済みコードには
# 効かない）。
# - ACCOUNT_URL/FACILITY_URL = web のオリジン（=SITE_URL）。web のログインは web 自身で完結し、かつ
#   admin(admin-spotomo) からのログイン後 redirect-back を resolvePostLogin が同一 apex(lykuro.ai) で
#   許可するために必要（空だと apex 不一致で /profile に落ちる）。
# - COOKIE_DOMAIN=.lykuro.ai: admin と web は別サブドメインで Supabase セッション Cookie を共有するため必須。
x-public: &public
  NEXT_PUBLIC_SUPABASE_URL: https://lkdltkkggjmsyodimdoy.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_acZRB7VYWjvTuJHrbe-5mA_NKg7G36i
  NEXT_PUBLIC_SITE_URL: https://spotomo.lykuro.ai
  NEXT_PUBLIC_ACCOUNT_URL: https://spotomo.lykuro.ai
  NEXT_PUBLIC_FACILITY_URL: https://spotomo.lykuro.ai
  NEXT_PUBLIC_COOKIE_DOMAIN: .lykuro.ai
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADoFYwWljS9AE7a0

x-app-common: &app-common
  env_file: .env.production
  restart: unless-stopped
  environment:
    <<: *public
  expose:
    - "3000"

services:
  web:
    <<: *app-common
    build:
      context: .
      dockerfile: docker/Dockerfile
      args: { APP: web, <<: *public }

  admin:
    <<: *app-common
    build:
      context: .
      dockerfile: docker/Dockerfile
      args: { APP: admin, <<: *public }

  # 定期バッチのスケジューラ（統合サイト化 Phase 3）。web の cron ルートを
  # 内部ネットワーク経由で叩く。CRON_SECRET は env_file から（起動時に crontab へ埋め込む）。
  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    env_file: .env.production
    restart: unless-stopped
    # 自治体ソース一覧をマウント（再ビルド不要でホット編集可。crond 起動時に再読込）。
    volumes:
      - ./data/municipal-sources.json:/sources.json:ro
    depends_on:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin

volumes:
  caddy_data:
  caddy_config:
